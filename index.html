<!DOCTYPE html>
<html>
<body style="margin:0;background:#0a1633;">
<canvas id="game" width="360" height="540"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 60;
const cols = 6;
const rows = 8;

let colors = ["#6ec5ff","#ff6e6e","#6effa1","#ffd96e","#c06eff"];
let grid = [];

function init(){
  for(let y=0;y<rows;y++){
    grid[y] = [];
    for(let x=0;x<cols;x++){
      grid[y][x] = colors[Math.floor(Math.random()*colors.length)];
    }
  }
}

function draw(){
  ctx.clearRect(0,0,360,540);

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      ctx.fillStyle = grid[y][x];
      ctx.beginPath();
      ctx.arc(
        x*size + size/2,
        y*size + size/2,
        size/2-5,
        0,
        Math.PI*2
      );
      ctx.fill();
    }
  }
}

init();
draw();
</script>
</body>
</html>
