<!DOCTYPE html>
<html>
<body style="margin:0;background:#0a1633;">
<canvas id="game" width="360" height="540"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 60;
const cols = 6;
const rows = 8;

let colors = ["#6ec5ff","#ff6e6e","#6effa1","#ffd96e","#c06eff"];
let grid = [];

let dragging = false;
let chain = [];
let targetColor = null;

function init(){
  for(let y=0;y<rows;y++){
    grid[y] = [];
    for(let x=0;x<cols;x++){
      grid[y][x] = colors[Math.floor(Math.random()*colors.length)];
    }
  }
}

function draw(){
  ctx.clearRect(0,0,360,540);

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      if(!grid[y][x]) continue;
      ctx.fillStyle = grid[y][x];
      ctx.beginPath();
      ctx.arc(x*size+30,y*size+30,25,0,Math.PI*2);
      ctx.fill();
    }
  }
}

function getCell(e){
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.touches?e.touches[0].clientX:e.clientX - rect.left)/size);
  const y = Math.floor((e.touches?e.touches[0].clientY:e.clientY - rect.top)/size);
  return {x,y};
}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",end);
canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",move);
canvas.addEventListener("touchend",end);

function start(e){
  dragging = true;
  chain = [];
  const {x,y} = getCell(e);
  if(grid[y] && grid[y][x]){
    targetColor = grid[y][x];
    chain.push({x,y});
  }
}

  if(!dragging) return;
  const {x,y} = getCell(e);
  if(!grid[y] || !grid[y][x]) return;
