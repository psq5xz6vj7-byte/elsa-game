<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elsa Training</title>

<style>
body{
margin:0;
background:#0b1220;
color:white;
font-family:sans-serif;
text-align:center;
}

#game{
background:#152040;
touch-action:manipulation;
border-radius:12px;
margin-top:10px;
}

button{
font-size:18px;
padding:10px 16px;
margin:8px;
border-radius:8px;
border:none;
background:#4da3ff;
color:white;
}
</style>
</head>

<body>

<h3>❄️ 戴冠式エルサ練習モード</h3>
<canvas id="game" width="360" height="540"></canvas><br>
<button onclick="skill()">スキル発動</button>
<div id="score">Score:0</div>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");

let player={x:180,y:400,size:20};
let enemies=[];
let score=0;

let flash = 0;
let freeze = 0;
let particles = [];
function spawn(){
enemies.push({
x:Math.random()*340,
y:-20,
speed:2+Math.random()*2
});
}

setInterval(spawn,800);

function skill() {
  score += 50;

  flash = 6;
  freeze = 40;

  for (let i = 0; i < 40; i++) {
    particles.push({
      x: player.x,
      y: player.y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      life: 30
    });
  }

  if (navigator.vibrate) {
    navigator.vibrate(120);
  }
}

function loop(){
ctx.clearRect(0,0,360,540);

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="red";
for(let e of enemies){
e.y+=e.speed;
ctx.fillRect(e.x,e.y,20,20);

if(Math.abs(e.x-player.x)<20 && Math.abs(e.y-player.y)<20){
alert("GAME OVER");
location.reload();
}
}

ctx.fillStyle="white";
ctx.fillText("Score:"+score,10,20);

// ❄️ フラッシュ
if (flash > 0) {
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.fillRect(0,0,360,540);
  flash--;
}

// 🧊 凍結オーバーレイ
if (freeze > 0) {
  ctx.fillStyle = "rgba(100,180,255,0.25)";
  ctx.fillRect(0,0,360,540);
  freeze--;
}

// ✨ パーティクル
particles.forEach(p => {
  ctx.fillStyle = "cyan";
  ctx.fillRect(p.x, p.y, 3, 3);
  p.x += p.vx;
  p.y += p.vy;
  p.life--;
});
particles = particles.filter(p => p.life > 0);

requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
